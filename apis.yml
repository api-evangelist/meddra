    description: >-
      MedDRA (Medical Dictionary for Regulatory Activities) and the WHO Drug Dictionary
      provide standardized medical terminology APIs for adverse event coding, drug
      safety reporting, and pharmacovigilance. APIs enable term lookup, hierarchy
      navigation, and coding validation for regulatory submissions.
